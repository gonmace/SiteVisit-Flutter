name: sitevisit_app
description: SiteVisit — Gestión de visitas técnicas a sitios de telecomunicaciones
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.0
  go_router: ^14.8.1
  http: ^1.2.0
  flutter_secure_storage: ^10.0.0
  device_info_plus: ^12.0.0
  geolocator: ^14.0.0
  permission_handler: ^12.0.0
  image_picker: ^1.1.0
  camera: ^0.11.0
  sqflite: ^2.3.0
  path: ^1.9.0
  path_provider: ^2.1.0
  connectivity_plus: ^7.0.0
  crypto: ^3.0.0
  url_launcher: ^6.3.0
  flutter_svg: ^2.0.0
  uuid: ^4.5.0
  image: ^4.2.0
  firebase_core: ^3.3.0
  firebase_crashlytics: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.0
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_native_splash:
  color: "#ffffff"
  color_dark: "#1C1C1E"
  image: logo.png
  image_dark: logo.png
  android: true
  ios: false
  android_12:
    image: logo.png
    image_dark: logo.png
    color: "#ffffff"
    color_dark: "#1C1C1E"
